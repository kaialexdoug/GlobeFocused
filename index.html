<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Hidden Japan">
<meta name="theme-color" content="#c4703a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Hidden Japan</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --cream:#faf8f4;
  --cream-dark:#ede8df;
  --brown-deep:#2a1f14;
  --brown-mid:#7a5c3e;
  --brown-light:#b8977a;
  --terracotta:#c4703a;
  --green:#4a8c5c;
  --red:#b83c3c;
  --border:rgba(42,31,20,0.1);
  --border-mid:rgba(42,31,20,0.18);
  --nav-h:60px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}

html,body{
  height:100%;
  overflow:hidden;
  background:var(--cream);
  font-family:'Inter',system-ui,sans-serif;
  color:var(--brown-deep);
}

/* ── Map ── */
#map{
  position:fixed;
  inset:0;
  bottom:calc(var(--nav-h) + var(--safe-bottom));
}

/* ── Top bar (floats over map) ── */
.top-bar{
  position:fixed;
  top:var(--safe-top);
  left:0;right:0;
  z-index:300;
  padding:10px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  pointer-events:none;
}

.logo{
  pointer-events:all;
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--cream);
  padding:7px 12px 7px 8px;
  border-radius:24px;
  box-shadow:0 2px 12px rgba(42,31,20,0.14);
  border:1px solid var(--border);
}

.logo-mark{
  width:24px;height:24px;
  background:var(--terracotta);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
}

.logo-name{
  font-family:'Playfair Display',serif;
  font-size:15px;font-weight:600;
  letter-spacing:-0.2px;
}

.top-bar-right{
  pointer-events:all;
  display:flex;gap:8px;
}

.icon-btn{
  width:38px;height:38px;
  border-radius:50%;
  background:var(--cream);
  border:1px solid var(--border);
  box-shadow:0 2px 10px rgba(42,31,20,0.12);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  color:var(--brown-mid);
}

/* ── Add mode banner ── */
.add-banner{
  position:fixed;
  top:calc(var(--safe-top) + 70px);
  left:50%;
  transform:translateX(-50%);
  background:var(--green);
  color:white;
  padding:9px 18px;
  border-radius:20px;
  font-size:13px;font-weight:500;
  z-index:400;
  white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,0.15);
  display:none;
}
.add-banner.visible{display:block}

/* ── Offline banner ── */
.offline-banner{
  position:fixed;
  top:calc(var(--safe-top) + 70px);
  left:50%;
  transform:translateX(-50%);
  background:var(--brown-mid);
  color:white;
  padding:7px 16px;
  border-radius:20px;
  font-size:12px;font-weight:500;
  z-index:400;
  white-space:nowrap;
  display:none;
}
.offline-banner.visible{display:block}

/* ── Bottom nav ── */
.bottom-nav{
  position:fixed;
  bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--cream);
  border-top:1px solid var(--border-mid);
  display:flex;
  align-items:center;
  justify-content:space-around;
  z-index:300;
}

.nav-btn{
  flex:1;
  height:var(--nav-h);
  border:none;
  background:transparent;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  cursor:pointer;
  color:var(--brown-light);
  font-size:10px;font-family:'Inter',sans-serif;
  font-weight:500;
  transition:color 0.15s;
}

.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

.nav-btn.active{color:var(--terracotta)}

.nav-btn-add{
  flex:1;
  height:var(--nav-h);
  border:none;background:transparent;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;
  font-size:10px;font-family:'Inter',sans-serif;font-weight:500;
  color:var(--terracotta);
}

.nav-btn-add .add-circle{
  width:46px;height:46px;
  background:var(--terracotta);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(196,112,58,0.4);
  margin-bottom:2px;
}

.nav-btn-add .add-circle svg{width:22px;height:22px;stroke:white;fill:none;stroke-width:2.2;stroke-linecap:round}

/* ── Sheet overlay ── */
.sheet-overlay{
  position:fixed;inset:0;
  background:rgba(42,31,20,0.35);
  z-index:490;
  display:none;
  opacity:0;
  transition:opacity 0.25s;
}
.sheet-overlay.visible{display:block;opacity:1}

/* ── Sheets (base) ── */
.sheet{
  position:fixed;
  left:0;right:0;bottom:0;
  background:var(--cream);
  border-radius:18px 18px 0 0;
  z-index:500;
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
  padding-bottom:calc(var(--nav-h) + var(--safe-bottom));
}
.sheet.open{transform:translateY(0)}

.sheet-handle{
  width:36px;height:4px;
  background:var(--border-mid);
  border-radius:2px;
  margin:10px auto 0;
}

/* ── Mini card (pin tap) ── */
.mini-card{max-height:200px}

.mini-card-inner{
  display:flex;
  gap:12px;
  padding:14px 16px 16px;
  align-items:center;
}

.mini-photo{
  width:72px;height:72px;
  border-radius:10px;
  overflow:hidden;
  flex-shrink:0;
  background:var(--cream-dark);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
}
.mini-photo img{width:100%;height:100%;object-fit:cover}

.mini-info{flex:1;min-width:0}

.mini-category{
  font-size:10px;font-weight:500;
  text-transform:uppercase;letter-spacing:0.6px;
  margin-bottom:3px;
}

.mini-name{
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:1px;
}

.mini-name-jp{font-size:11px;color:var(--brown-light);margin-bottom:5px}

.mini-desc{
  font-size:12px;color:var(--brown-mid);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  line-height:1.45;
}

.mini-actions{
  display:flex;
  gap:8px;
  padding:0 16px 4px;
}

.mini-btn{
  flex:1;padding:9px 0;
  border-radius:8px;
  border:1px solid var(--border-mid);
  background:transparent;
  font-family:'Inter',sans-serif;
  font-size:13px;font-weight:500;
  color:var(--brown-mid);
  cursor:pointer;
}
.mini-btn.primary{
  background:var(--terracotta);
  color:white;border-color:var(--terracotta);
}

/* ── Detail sheet ── */
.detail-sheet{
  max-height:88vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

.detail-photo{
  width:100%;height:200px;
  position:relative;overflow:hidden;
  background:var(--cream-dark);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

.detail-photo img{width:100%;height:100%;object-fit:cover}

.detail-photo-placeholder{
  display:flex;flex-direction:column;
  align-items:center;gap:6px;
  color:var(--brown-light);font-size:12px;
}

.detail-photo-nav{
  position:absolute;bottom:10px;right:12px;
  display:flex;gap:4px;
}
.photo-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,0.5);cursor:pointer;
}
.photo-dot.active{background:white}

.detail-body{padding:16px 18px 24px}

.detail-category{
  font-size:10px;font-weight:500;
  text-transform:uppercase;letter-spacing:0.7px;
  margin-bottom:5px;
}

.detail-title{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:600;
  line-height:1.2;margin-bottom:3px;
}

.detail-title-jp{font-size:13px;color:var(--brown-light);margin-bottom:8px}

.detail-meta{
  display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px;
}

.meta-chip{
  font-size:11px;padding:3px 9px;
  border-radius:20px;
  background:var(--cream-dark);
  color:var(--brown-mid);
  border:1px solid var(--border);
}

.detail-desc{
  font-size:14px;color:var(--brown-deep);
  line-height:1.75;margin-bottom:4px;
}

.detail-divider{height:1px;background:var(--border);margin:14px 0}

.detail-section-label{
  font-size:10px;font-weight:500;
  text-transform:uppercase;letter-spacing:0.9px;
  color:var(--brown-light);margin-bottom:5px;
}

.detail-section-text{
  font-size:13px;color:var(--brown-mid);line-height:1.65;
}

.detail-actions{
  display:flex;gap:8px;margin-top:18px;
}
.detail-actions .btn{
  flex:1;padding:11px 0;text-align:center;
  border-radius:8px;font-family:'Inter',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;
}

/* ── Edit sheet ── */
.edit-sheet{
  max-height:96vh;
  display:flex;flex-direction:column;
}

.edit-header{
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}

.edit-title{
  font-family:'Playfair Display',serif;
  font-size:17px;font-weight:600;
}

.edit-body{
  flex:1;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:16px;
}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.form-group{margin-bottom:14px}

.form-label{
  display:block;font-size:10px;font-weight:500;
  text-transform:uppercase;letter-spacing:0.6px;
  color:var(--brown-light);margin-bottom:4px;
}

.form-label span{
  text-transform:none;letter-spacing:0;
  font-weight:400;opacity:0.7;
}

.form-input,.form-select,.form-textarea{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--border-mid);
  border-radius:8px;
  background:white;
  font-family:'Inter',sans-serif;
  font-size:14px;
  color:var(--brown-deep);
  outline:none;
  -webkit-appearance:none;
  appearance:none;
}

.form-input:focus,.form-select:focus,.form-textarea:focus{
  border-color:var(--terracotta);
}

.form-textarea{resize:vertical;min-height:76px;line-height:1.6}
.form-textarea.short{min-height:56px}

.photo-upload-area{
  border:1.5px dashed var(--border-mid);
  border-radius:8px;padding:14px;
  text-align:center;cursor:pointer;
  background:var(--cream-dark);
}
.photo-upload-label{
  font-size:12px;color:var(--brown-mid);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;
}
.upload-icon{font-size:20px;opacity:0.5}

.photo-thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}

.photo-thumb{
  position:relative;width:68px;height:68px;
  border-radius:6px;overflow:hidden;
  border:1px solid var(--border-mid);
}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb-remove{
  position:absolute;top:2px;right:2px;
  width:18px;height:18px;border-radius:50%;
  background:rgba(42,31,20,0.7);color:white;
  border:none;cursor:pointer;font-size:10px;
  display:flex;align-items:center;justify-content:center;
}

.edit-footer{
  padding:12px 16px;
  border-top:1px solid var(--border);
  display:flex;gap:8px;flex-shrink:0;
  background:var(--cream);
}
.edit-footer .btn{
  flex:1;padding:11px 0;text-align:center;
  border-radius:8px;font-family:'Inter',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;border:none;
}

/* ── Add options sheet ── */
.add-options-sheet{max-height:240px}
.add-options-body{padding:8px 16px 4px}

.add-option-btn{
  width:100%;
  display:flex;align-items:center;gap:14px;
  padding:14px 4px;
  background:transparent;border:none;
  border-bottom:1px solid var(--border);
  cursor:pointer;text-align:left;
  font-family:'Inter',sans-serif;
}
.add-option-btn:last-child{border-bottom:none}

.add-option-icon{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

.add-option-icon svg{width:20px;height:20px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.add-option-title{font-size:15px;font-weight:500;color:var(--brown-deep)}
.add-option-sub{font-size:12px;color:var(--brown-light);margin-top:1px}

/* ── Layer sheet ── */
.layer-sheet{max-height:70vh;overflow-y:auto;-webkit-overflow-scrolling:touch}

.layer-sheet-header{
  padding:14px 16px 10px;
  font-family:'Playfair Display',serif;
  font-size:17px;font-weight:600;
}

.layer-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;padding:0 16px 16px;
}

.layer-toggle{
  display:flex;align-items:center;gap:9px;
  padding:11px 12px;
  border-radius:10px;
  border:1.5px solid var(--border-mid);
  background:white;
  cursor:pointer;
  font-family:'Inter',sans-serif;
  font-size:12.5px;font-weight:500;
  color:var(--brown-mid);
  transition:background 0.15s,border-color 0.15s,color 0.15s;
  text-align:left;
}

.layer-toggle.active{color:white;border-color:transparent}

.layer-toggle-dot{
  width:9px;height:9px;border-radius:50%;flex-shrink:0;
}

/* ── Menu sheet ── */
.menu-sheet{max-height:280px}
.menu-body{padding:8px 16px 4px}

.menu-item{
  width:100%;
  display:flex;align-items:center;gap:14px;
  padding:14px 4px;
  background:transparent;border:none;
  border-bottom:1px solid var(--border);
  cursor:pointer;text-align:left;
  font-family:'Inter',sans-serif;font-size:15px;
  font-weight:500;color:var(--brown-deep);
}
.menu-item:last-child{border-bottom:none}
.menu-item svg{width:20px;height:20px;stroke:var(--brown-mid);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

.menu-pin-count{
  font-size:12px;color:var(--brown-light);
  padding:12px 4px 6px;
}

/* ── Confirm overlay ── */
.confirm-overlay{
  position:fixed;inset:0;
  background:rgba(42,31,20,0.45);
  z-index:600;
  display:none;
  align-items:center;justify-content:center;
  padding:20px;
}
.confirm-overlay.visible{display:flex}

.confirm-box{
  background:var(--cream);
  border-radius:16px;
  padding:24px;
  width:100%;max-width:320px;
  box-shadow:0 12px 40px rgba(42,31,20,0.2);
}
.confirm-title{
  font-family:'Playfair Display',serif;
  font-size:17px;font-weight:600;margin-bottom:8px;
}
.confirm-msg{font-size:13px;color:var(--brown-mid);line-height:1.6;margin-bottom:18px}
.confirm-actions{display:flex;gap:8px}
.confirm-actions .btn{
  flex:1;padding:10px 0;text-align:center;
  border-radius:8px;font-family:'Inter',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;border:none;
}

/* ── Shared button styles ── */
.btn-ghost{background:transparent;border:1px solid var(--border-mid)!important;color:var(--brown-mid)}
.btn-primary{background:var(--terracotta);color:white}
.btn-danger{background:var(--red);color:white}
.btn-green{background:var(--green);color:white}

/* ── Leaflet overrides ── */
.leaflet-popup-content-wrapper{
  border-radius:12px!important;
  padding:0!important;overflow:hidden!important;
  box-shadow:0 6px 24px rgba(42,31,20,0.16)!important;
  border:1px solid var(--border)!important;
  background:var(--cream)!important;
  display:none!important; /* hide default popups — we use bottom sheets */
}
.leaflet-popup-tip-container{display:none!important}
.leaflet-control-zoom{margin-bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px)!important}
.leaflet-control-attribution{font-size:9px;background:rgba(250,248,244,0.8)!important}

#map.add-mode{cursor:crosshair!important}
</style>
</head>
<body>

<div id="map"></div>

<header class="top-bar">
  <div class="logo">
    <div class="logo-mark">
      <svg width="14" height="14" viewBox="0 0 17 17" fill="none">
        <circle cx="8.5" cy="7" r="3.5" fill="white"/>
        <path d="M8.5 1v2M8.5 12v2M2 7H4M13 7h2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M8.5 7L12 13.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="logo-name">Hidden Japan</span>
  </div>
  <div class="top-bar-right">
    <button class="icon-btn" onclick="openSheet('layers')" title="Layers">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5M2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </button>
  </div>
</header>

<div class="add-banner" id="addBanner">Tap map to place pin — or press ✕ to cancel</div>
<div class="offline-banner" id="offlineBanner">Offline — viewing saved pins</div>

<!-- Sheet overlay -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeAllSheets()"></div>

<!-- Mini card -->
<div class="sheet mini-card" id="miniCard">
  <div class="sheet-handle"></div>
  <div class="mini-card-inner" id="miniCardInner"></div>
  <div class="mini-actions" id="miniActions"></div>
</div>

<!-- Detail sheet -->
<div class="sheet detail-sheet" id="detailSheet">
  <div class="sheet-handle"></div>
  <div class="detail-photo" id="detailPhoto"></div>
  <div class="detail-body" id="detailBody"></div>
</div>

<!-- Edit sheet -->
<div class="sheet edit-sheet" id="editSheet">
  <div class="sheet-handle"></div>
  <div class="edit-header">
    <span class="edit-title" id="editTitle">Add pin</span>
    <button class="icon-btn" style="position:static;width:32px;height:32px;border:none;background:transparent;color:var(--brown-mid)" onclick="closeAllSheets()">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="edit-body">
    <div class="form-row">
      <div>
        <label class="form-label">Name <span>(English)</span></label>
        <input class="form-input" id="fNameEn" type="text" placeholder="e.g. Fushimi Inari">
      </div>
      <div>
        <label class="form-label">Name <span>(Japanese)</span></label>
        <input class="form-input" id="fNameJp" type="text" placeholder="e.g. 伏見稲荷">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="fCategory">
        <option value="">— select —</option>
        <option value="photography">📸 Photography Spot</option>
        <option value="temples">⛩️ Hidden Temple / Shrine</option>
        <option value="scenic">🚆 Scenic Train / Drive</option>
        <option value="cafes">☕ Unique Cafe / Stay</option>
        <option value="drone">🚁 Drone Spot</option>
        <option value="seasonal">🌸 Seasonal Location</option>
        <option value="walking">🥾 Walking Route</option>
        <option value="sunrise">🌅 Sunrise / Sunset</option>
      </select>
    </div>
    <div class="form-row">
      <div>
        <label class="form-label">Latitude</label>
        <input class="form-input" id="fLat" type="number" step="0.0001" placeholder="35.0000">
      </div>
      <div>
        <label class="form-label">Longitude</label>
        <input class="form-input" id="fLng" type="number" step="0.0001" placeholder="135.0000">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Prefecture / Region</label>
      <input class="form-input" id="fRegion" type="text" placeholder="e.g. Kyoto">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="fDesc" placeholder="What makes this place special?"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Best Season / Time</label>
      <input class="form-input" id="fSeason" type="text" placeholder="e.g. Early April, dawn">
    </div>
    <div class="form-group">
      <label class="form-label">How to Get There</label>
      <textarea class="form-textarea short" id="fDirections" placeholder="Transport, stops, entrance fees..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Photos</label>
      <div class="photo-upload-area" onclick="document.getElementById('fPhotos').click()">
        <label class="photo-upload-label">
          <span class="upload-icon">🖼</span>
          <span>Tap to add photos from your camera or library</span>
        </label>
        <input type="file" id="fPhotos" accept="image/*" multiple capture="environment" onchange="handlePhotoUpload(this)" style="display:none">
      </div>
      <div class="photo-thumbs" id="photoThumbs"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes / Tips</label>
      <textarea class="form-textarea short" id="fNotes" placeholder="Insider tips, warnings, nearby spots..."></textarea>
    </div>
  </div>
  <div class="edit-footer">
    <button class="btn btn-ghost" onclick="closeAllSheets()" style="border:1px solid var(--border-mid)">Cancel</button>
    <button class="btn btn-danger" id="btnDelete" style="display:none" onclick="confirmDelete()">Delete</button>
    <button class="btn btn-primary" onclick="savePin()">Save pin</button>
  </div>
</div>

<!-- Add options sheet -->
<div class="sheet add-options-sheet" id="addOptionsSheet">
  <div class="sheet-handle"></div>
  <div class="add-options-body">
    <button class="add-option-btn" onclick="startTapMode()">
      <div class="add-option-icon" style="background:var(--terracotta)">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
      </div>
      <div>
        <div class="add-option-title">Tap on map</div>
        <div class="add-option-sub">Place pin at any location</div>
      </div>
    </button>
    <button class="add-option-btn" onclick="useGPS()">
      <div class="add-option-icon" style="background:var(--green)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="3 2"/></svg>
      </div>
      <div>
        <div class="add-option-title">Use my location</div>
        <div class="add-option-sub">Drop pin where you are now</div>
      </div>
    </button>
  </div>
</div>

<!-- Layer sheet -->
<div class="sheet layer-sheet" id="layerSheet">
  <div class="sheet-handle"></div>
  <div class="layer-sheet-header">Map layers</div>
  <div class="layer-grid" id="layerGrid"></div>
</div>

<!-- Menu sheet -->
<div class="sheet menu-sheet" id="menuSheet">
  <div class="sheet-handle"></div>
  <div class="menu-body">
    <div class="menu-pin-count" id="menuPinCount">0 pins saved</div>
    <button class="menu-item" onclick="exportPins()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Export pins to JSON
    </button>
    <label class="menu-item" style="cursor:pointer">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      Import pins from JSON
      <input type="file" accept=".json" style="display:none" onchange="importPins(this)">
    </label>
  </div>
</div>

<!-- Confirm overlay -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">Remove this pin?</div>
    <div class="confirm-msg" id="confirmMsg">This pin and all its data will be permanently removed.</div>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()" style="border:1px solid var(--border-mid)">Cancel</button>
      <button class="btn btn-danger" onclick="executeDelete()">Remove</button>
    </div>
  </div>
</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <button class="nav-btn" id="navMap" onclick="closeAllSheets()">
    <svg viewBox="0 0 24 24"><path d="M3 7l6-3 6 3 6-3v13l-6 3-6-3-6 3V7z"/><path d="M9 4v13M15 7v13"/></svg>
    Map
  </button>
  <button class="nav-btn" id="navLayers" onclick="openSheet('layers')">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    Layers
  </button>
  <button class="nav-btn-add" onclick="openSheet('addOptions')">
    <div class="add-circle">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    Add pin
  </button>
  <button class="nav-btn" id="navMenu" onclick="openSheet('menu')">
    <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    Menu
  </button>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ── Service worker ── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

/* ── Offline detection ── */
function updateOnlineStatus() {
  document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine);
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

/* ── Layer config ── */
const LAYERS = {
  photography: { label:'Photography',      emoji:'📸', color:'#d4683a', grad:['#f4a86a','#b84818'] },
  temples:     { label:'Hidden Temples',   emoji:'⛩️', color:'#7c5cbf', grad:['#b088e8','#5c3a9a'] },
  scenic:      { label:'Scenic Routes',    emoji:'🚆', color:'#3a8a6e', grad:['#78c4a4','#206050'] },
  cafes:       { label:'Unique Stays',     emoji:'☕', color:'#b8892a', grad:['#e8c870','#88620a'] },
  drone:       { label:'Drone Spots',      emoji:'🚁', color:'#3a70b5', grad:['#78a8e0','#1a4880'] },
  seasonal:    { label:'Seasonal',         emoji:'🌸', color:'#c0507a', grad:['#e890b8','#903060'] },
  walking:     { label:'Walking Routes',   emoji:'🥾', color:'#5a9032', grad:['#98ce60','#386810'] },
  sunrise:     { label:'Sunrise & Sunset', emoji:'🌅', color:'#c85030', grad:['#f09060','#983010'] },
};

/* ── IndexedDB ── */
const DB_NAME = 'japanfocused_v2', DB_VER = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore('pins', { keyPath:'id' });
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbGetAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction('pins','readonly').objectStore('pins').getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbPutAll(allPins) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('pins','readwrite');
    const store = tx.objectStore('pins');
    store.clear();
    allPins.forEach(p => store.put(p));
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

function savePins() {
  dbPutAll(pins).catch(e => console.error('Save failed:', e));
  updatePinCount();
}

/* ── Export / Import ── */
function exportPins() {
  if (!pins.length) { alert('No pins to export yet.'); return; }
  const blob = new Blob([JSON.stringify(pins, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pins.json';
  a.click();
  closeAllSheets();
}

function importPins(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error();
      if (!confirm(`Import ${imported.length} pins? This will replace your current ${pins.length} pins.`)) return;
      pins = imported;
      savePins();
      renderAllPins();
      closeAllSheets();
    } catch { alert('Invalid file.'); }
  };
  reader.readAsText(file);
  input.value = '';
}

/* ── State ── */
let pins = [];
let addMode = false;
let editingPinId = null;
let pendingDeleteId = null;
let photoData = [];
let currentPhotoIdx = 0;
const markerMap = {};
const layerGroups = {};
const activeLayers = new Set(Object.keys(LAYERS));

/* ── Map ── */
const map = L.map('map', { center:[36.5,137.5], zoom:6, zoomControl:true });

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; CARTO',
  subdomains:'abcd', maxZoom:19,
}).addTo(map);

Object.keys(LAYERS).forEach(key => {
  layerGroups[key] = L.layerGroup().addTo(map);
});

/* ── Layer grid ── */
const layerGrid = document.getElementById('layerGrid');
Object.entries(LAYERS).forEach(([key, lyr]) => {
  const btn = document.createElement('button');
  btn.className = 'layer-toggle active';
  btn.dataset.layer = key;
  btn.style.cssText = `background:${lyr.color};border-color:${lyr.color};color:white`;
  btn.innerHTML = `<span class="layer-toggle-dot" style="background:white;opacity:0.8"></span>${lyr.emoji} ${lyr.label}`;
  btn.addEventListener('click', () => {
    if (activeLayers.has(key)) {
      activeLayers.delete(key);
      map.removeLayer(layerGroups[key]);
      btn.classList.remove('active');
      btn.style.cssText = '';
      btn.querySelector('.layer-toggle-dot').style.cssText = `background:${lyr.color}`;
    } else {
      activeLayers.add(key);
      map.addLayer(layerGroups[key]);
      btn.classList.add('active');
      btn.style.cssText = `background:${lyr.color};border-color:${lyr.color};color:white`;
      btn.querySelector('.layer-toggle-dot').style.cssText = 'background:white;opacity:0.8';
    }
  });
  layerGrid.appendChild(btn);
});

/* ── Marker icon ── */
function makeIcon(layerKey) {
  const { color, emoji } = LAYERS[layerKey] || LAYERS.photography;
  return L.divIcon({
    className:'',
    html:`<svg width="32" height="40" viewBox="0 0 30 36" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 0C7 0 0 7 0 15c0 10.5 15 21 15 21s15-10.5 15-21C30 7 23 0 15 0z" fill="${color}" opacity="0.92"/>
      <circle cx="15" cy="14" r="7.5" fill="white" opacity="0.95"/>
      <text x="15" y="18.5" text-anchor="middle" font-size="9" font-family="sans-serif">${emoji}</text>
    </svg>`,
    iconSize:[32,40], iconAnchor:[16,40], popupAnchor:[0,-42],
  });
}

/* ── Render pins ── */
function renderAllPins() {
  Object.values(layerGroups).forEach(g => g.clearLayers());
  Object.keys(markerMap).forEach(k => delete markerMap[k]);
  pins.forEach(renderPin);
  updatePinCount();
}

function renderPin(pin) {
  const marker = L.marker([pin.lat, pin.lng], { icon: makeIcon(pin.layer) });
  marker.on('click', () => openMiniCard(pin.id));
  layerGroups[pin.layer].addLayer(marker);
  markerMap[pin.id] = marker;
}

function updatePinCount() {
  const n = pins.length;
  const t = n === 1 ? '1 pin' : `${n} pins`;
  document.getElementById('menuPinCount').textContent = t + ' saved';
}

/* ── Mini card ── */
function openMiniCard(id) {
  const pin = pins.find(p => p.id === id);
  if (!pin) return;
  const lyr = LAYERS[pin.layer] || LAYERS.photography;
  const grad = `linear-gradient(135deg,${lyr.grad[0]},${lyr.grad[1]})`;
  const photoSrc = pin.photos && pin.photos.length ? pin.photos[0] : null;

  document.getElementById('miniCardInner').innerHTML = `
    <div class="mini-photo">
      ${photoSrc ? `<img src="${photoSrc}" alt="">` : `<div style="width:100%;height:100%;background:${grad};display:flex;align-items:center;justify-content:center;font-size:22px;opacity:0.7">${lyr.emoji}</div>`}
    </div>
    <div class="mini-info">
      <div class="mini-category" style="color:${lyr.color}">${lyr.emoji} ${lyr.label}</div>
      <div class="mini-name">${pin.nameEn || 'Unnamed pin'}</div>
      ${pin.nameJp ? `<div class="mini-name-jp">${pin.nameJp}</div>` : ''}
      ${pin.desc ? `<div class="mini-desc">${pin.desc}</div>` : ''}
    </div>`;

  document.getElementById('miniActions').innerHTML = `
    <button class="mini-btn" onclick="openEditSheet('${pin.id}')">Edit</button>
    <button class="mini-btn primary" onclick="openDetailSheet('${pin.id}')">View details</button>`;

  openSheet('mini');
}

/* ── Detail sheet ── */
function openDetailSheet(id) {
  const pin = pins.find(p => p.id === id);
  if (!pin) return;
  const lyr = LAYERS[pin.layer] || LAYERS.photography;
  const grad = `linear-gradient(135deg,${lyr.grad[0]},${lyr.grad[1]})`;
  currentPhotoIdx = 0;

  const photoEl = document.getElementById('detailPhoto');
  if (pin.photos && pin.photos.length) {
    const dots = pin.photos.length > 1
      ? `<div class="detail-photo-nav">${pin.photos.map((_,i) =>
          `<div class="photo-dot${i===0?' active':''}" onclick="showDetailPhoto('${id}',${i})"></div>`
        ).join('')}</div>` : '';
    photoEl.innerHTML = `<img id="detailPhotoImg" src="${pin.photos[0]}" alt="">${dots}`;
  } else {
    photoEl.innerHTML = `<div class="detail-photo-placeholder" style="background:${grad};width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px">
      <div style="font-size:38px;opacity:0.45">${lyr.emoji}</div>
      <span style="font-size:11px;color:rgba(255,255,255,0.7)">No photos yet</span>
    </div>`;
  }

  const metaChips = [
    pin.region ? `📍 ${pin.region}` : null,
    pin.season ? `🗓 ${pin.season}` : null,
  ].filter(Boolean).map(c => `<span class="meta-chip">${c}</span>`).join('');

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-category" style="color:${lyr.color}">${lyr.emoji} ${lyr.label}</div>
    <div class="detail-title">${pin.nameEn || 'Unnamed pin'}</div>
    ${pin.nameJp ? `<div class="detail-title-jp">${pin.nameJp}</div>` : ''}
    ${metaChips ? `<div class="detail-meta">${metaChips}</div>` : ''}
    ${pin.desc ? `<div class="detail-desc">${pin.desc}</div>` : ''}
    ${pin.directions ? `<div class="detail-divider"></div>
      <div class="detail-section-label">How to get there</div>
      <div class="detail-section-text">${pin.directions}</div>` : ''}
    ${pin.notes ? `<div class="detail-divider"></div>
      <div class="detail-section-label">Notes & tips</div>
      <div class="detail-section-text">${pin.notes}</div>` : ''}
    <div class="detail-actions">
      <button class="btn btn-ghost" onclick="openEditSheet('${id}')" style="border:1px solid var(--border-mid)">Edit</button>
      <button class="btn btn-danger" onclick="pendingDeleteId='${id}';confirmDelete()">Remove</button>
    </div>`;

  openSheet('detail');
}

function showDetailPhoto(pinId, idx) {
  const pin = pins.find(p => p.id === pinId);
  if (!pin || !pin.photos) return;
  document.getElementById('detailPhotoImg').src = pin.photos[idx];
  document.querySelectorAll('.photo-dot').forEach((d,i) => d.classList.toggle('active', i === idx));
}

/* ── Edit sheet ── */
function openEditSheet(id, lat, lng) {
  editingPinId = id || null;
  photoData = [];
  const pin = id ? pins.find(p => p.id === id) : null;

  document.getElementById('editTitle').textContent = id ? 'Edit pin' : 'Add pin';
  document.getElementById('btnDelete').style.display = id ? '' : 'none';
  document.getElementById('fNameEn').value     = pin?.nameEn     || '';
  document.getElementById('fNameJp').value     = pin?.nameJp     || '';
  document.getElementById('fCategory').value   = pin?.layer      || '';
  document.getElementById('fLat').value        = pin ? pin.lat   : (lat != null ? lat.toFixed(6) : '');
  document.getElementById('fLng').value        = pin ? pin.lng   : (lng != null ? lng.toFixed(6) : '');
  document.getElementById('fRegion').value     = pin?.region     || '';
  document.getElementById('fDesc').value       = pin?.desc       || '';
  document.getElementById('fSeason').value     = pin?.season     || '';
  document.getElementById('fDirections').value = pin?.directions || '';
  document.getElementById('fNotes').value      = pin?.notes      || '';
  photoData = pin?.photos ? [...pin.photos] : [];
  renderPhotoThumbs();
  openSheet('edit');
}

/* ── Photo upload ── */
function handlePhotoUpload(input) {
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      photoData.push(e.target.result);
      renderPhotoThumbs();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderPhotoThumbs() {
  document.getElementById('photoThumbs').innerHTML = photoData.map((src, i) => `
    <div class="photo-thumb">
      <img src="${src}" alt="">
      <button class="photo-thumb-remove" onclick="removePhoto(${i})">✕</button>
    </div>`).join('');
}

function removePhoto(idx) {
  photoData.splice(idx, 1);
  renderPhotoThumbs();
}

/* ── Save pin ── */
function savePin() {
  const nameEn = document.getElementById('fNameEn').value.trim();
  const layer  = document.getElementById('fCategory').value;
  const lat    = parseFloat(document.getElementById('fLat').value);
  const lng    = parseFloat(document.getElementById('fLng').value);

  if (!nameEn) { alert('Please enter a name.'); return; }
  if (!layer)  { alert('Please select a category.'); return; }
  if (isNaN(lat) || isNaN(lng)) { alert('Please enter valid coordinates.'); return; }

  const data = {
    nameEn, layer, lat, lng,
    nameJp:     document.getElementById('fNameJp').value.trim(),
    region:     document.getElementById('fRegion').value.trim(),
    desc:       document.getElementById('fDesc').value.trim(),
    season:     document.getElementById('fSeason').value.trim(),
    directions: document.getElementById('fDirections').value.trim(),
    notes:      document.getElementById('fNotes').value.trim(),
    photos:     [...photoData],
    updatedAt:  Date.now(),
  };

  if (editingPinId) {
    const idx = pins.findIndex(p => p.id === editingPinId);
    pins[idx] = { ...pins[idx], ...data };
  } else {
    pins.push({ id: Date.now().toString(), createdAt: Date.now(), ...data });
  }

  savePins();
  renderAllPins();
  closeAllSheets();
}

/* ── Delete ── */
function confirmDelete() {
  if (!pendingDeleteId && editingPinId) pendingDeleteId = editingPinId;
  const pin = pins.find(p => p.id === pendingDeleteId);
  document.getElementById('confirmMsg').textContent =
    pin ? `"${pin.nameEn || 'This pin'}" will be permanently removed.` : 'This pin will be permanently removed.';
  document.getElementById('confirmOverlay').classList.add('visible');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('visible');
  pendingDeleteId = null;
}

function executeDelete() {
  pins = pins.filter(p => p.id !== pendingDeleteId);
  savePins();
  renderAllPins();
  closeConfirm();
  closeAllSheets();
}

/* ── Add pin modes ── */
function startTapMode() {
  closeAllSheets();
  addMode = true;
  document.getElementById('map').classList.add('add-mode');
  document.getElementById('addBanner').classList.add('visible');
}

function useGPS() {
  closeAllSheets();
  if (!navigator.geolocation) { alert('Geolocation is not available on this device.'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      map.setView([lat, lng], 14);
      openEditSheet(null, lat, lng);
    },
    () => alert('Could not get your location. Check location permissions.')
  );
}

map.on('click', e => {
  if (!addMode) return;
  addMode = false;
  document.getElementById('map').classList.remove('add-mode');
  document.getElementById('addBanner').classList.remove('visible');
  openEditSheet(null, e.latlng.lat, e.latlng.lng);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (addMode) {
      addMode = false;
      document.getElementById('map').classList.remove('add-mode');
      document.getElementById('addBanner').classList.remove('visible');
    } else {
      closeAllSheets();
    }
  }
});

/* ── Sheet management ── */
const SHEET_IDS = {
  mini:       'miniCard',
  detail:     'detailSheet',
  edit:       'editSheet',
  addOptions: 'addOptionsSheet',
  layers:     'layerSheet',
  menu:       'menuSheet',
};

function openSheet(name) {
  // Close all others first
  Object.values(SHEET_IDS).forEach(id => document.getElementById(id).classList.remove('open'));
  document.getElementById('sheetOverlay').classList.add('visible');
  document.getElementById(SHEET_IDS[name]).classList.add('open');
  // Nav highlight
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (name === 'layers') document.getElementById('navLayers').classList.add('active');
  if (name === 'menu')   document.getElementById('navMenu').classList.add('active');
}

function closeAllSheets() {
  Object.values(SHEET_IDS).forEach(id => document.getElementById(id).classList.remove('open'));
  document.getElementById('sheetOverlay').classList.remove('visible');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('navMap').classList.add('active');
  editingPinId = null;
  pendingDeleteId = null;
}

/* ── Init ── */
async function init() {
  pins = await dbGetAll();
  renderAllPins();
  document.getElementById('navMap').classList.add('active');
}

init();
</script>
</body>
</html>
