<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JapanFocused — curated travel map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #faf8f4;
  --cream-dark: #ede8df;
  --brown-deep: #2a1f14;
  --brown-mid: #7a5c3e;
  --brown-light: #b8977a;
  --terracotta: #c4703a;
  --green: #4a8c5c;
  --red: #b83c3c;
  --border: rgba(42,31,20,0.1);
  --border-mid: rgba(42,31,20,0.18);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--cream);
  color: var(--brown-deep);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.header {
  background: var(--cream);
  border-bottom: 1px solid var(--border-mid);
  padding: 0 16px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 900;
  gap: 10px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 9px;
  flex-shrink: 0;
}

.logo-mark {
  width: 30px;
  height: 30px;
  background: var(--terracotta);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-name {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  padding: 6px 14px;
  border-radius: 7px;
  font-size: 12.5px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  cursor: pointer;
  border: none;
  white-space: nowrap;
}

.btn-ghost {
  border: 1px solid var(--border-mid);
  background: transparent;
  color: var(--brown-mid);
}

.btn-ghost:hover { background: var(--cream-dark); }

.btn-add {
  background: var(--green);
  color: white;
}

.btn-add:hover { filter: brightness(1.08); }

.btn-add.active {
  background: #2d6640;
  box-shadow: 0 0 0 3px rgba(74,140,92,0.25);
}

.btn-danger {
  background: var(--red);
  color: white;
}

.btn-danger:hover { filter: brightness(1.08); }

.btn-primary {
  background: var(--terracotta);
  color: white;
}

.btn-primary:hover { filter: brightness(1.08); }

/* ── Layer bar ── */
.layer-bar {
  background: var(--cream);
  border-bottom: 1px solid var(--border);
  padding: 7px 14px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
  z-index: 800;
  align-items: center;
}

.layer-bar::-webkit-scrollbar { display: none; }

.layer-bar-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--brown-light);
  text-transform: uppercase;
  letter-spacing: 0.7px;
  display: flex;
  align-items: center;
  white-space: nowrap;
  padding-right: 8px;
  border-right: 1px solid var(--border-mid);
  margin-right: 2px;
  flex-shrink: 0;
}

.layer-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border-mid);
  background: white;
  font-size: 11.5px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s, border-color 0.15s, color 0.15s, opacity 0.15s;
  color: var(--brown-mid);
}

.layer-pill.inactive {
  opacity: 0.4;
  background: var(--cream-dark);
  border-color: transparent;
  color: var(--brown-light);
}

/* ── Map ── */
#map { flex: 1; z-index: 1; }

#map.add-mode { cursor: crosshair !important; }
#map.add-mode .leaflet-interactive { cursor: crosshair !important; }

/* ── Add mode banner ── */
.add-banner {
  position: fixed;
  top: 112px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--green);
  color: white;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  z-index: 1500;
  pointer-events: none;
  display: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}

.add-banner.visible { display: block; }

/* ── Leaflet popup ── */
.leaflet-popup-content-wrapper {
  border-radius: 12px !important;
  padding: 0 !important;
  overflow: hidden !important;
  box-shadow: 0 8px 28px rgba(42,31,20,0.18) !important;
  border: 1px solid rgba(42,31,20,0.1) !important;
  background: var(--cream) !important;
}

.leaflet-popup-content {
  margin: 0 !important;
  width: 240px !important;
  line-height: 1 !important;
}

.leaflet-popup-tip { background: var(--cream) !important; }

/* ── Popup inner ── */
.popup-photo {
  width: 100%;
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: var(--cream-dark);
}

.popup-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.popup-photo-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--brown-light);
  font-size: 11px;
}

.popup-photo-placeholder .emoji { font-size: 28px; opacity: 0.5; }

.popup-body { padding: 11px 13px 13px; }

.popup-category {
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  margin-bottom: 4px;
}

.popup-title {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--brown-deep);
  margin-bottom: 3px;
  line-height: 1.25;
}

.popup-title-jp {
  font-size: 11px;
  color: var(--brown-light);
  margin-bottom: 6px;
}

.popup-summary {
  font-size: 12px;
  color: var(--brown-mid);
  line-height: 1.5;
  margin-bottom: 11px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.popup-actions {
  display: flex;
  gap: 6px;
}

.popup-btn {
  flex: 1;
  padding: 6px 0;
  border-radius: 6px;
  font-size: 11.5px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border-mid);
  background: transparent;
  color: var(--brown-mid);
}

.popup-btn.primary {
  background: var(--terracotta);
  color: white;
  border-color: var(--terracotta);
}

/* ── Right panel (view + edit) ── */
.side-panel {
  position: fixed;
  top: 0;
  right: -440px;
  width: 410px;
  height: 100vh;
  background: var(--cream);
  border-left: 1px solid var(--border-mid);
  z-index: 2000;
  transition: right 0.28s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
  overflow-x: hidden;
  box-shadow: -6px 0 28px rgba(42,31,20,0.08);
  display: flex;
  flex-direction: column;
}

.side-panel.open { right: 0; }

/* View mode */
.panel-view { display: none; flex-direction: column; flex: 1; }
.panel-view.active { display: flex; }

.panel-photos {
  width: 100%;
  height: 200px;
  position: relative;
  flex-shrink: 0;
  background: var(--cream-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.panel-photos img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.panel-photo-nav {
  position: absolute;
  bottom: 10px;
  right: 10px;
  display: flex;
  gap: 4px;
}

.panel-photo-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  cursor: pointer;
}

.panel-photo-dot.active { background: white; }

.panel-photos-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: var(--brown-light);
  font-size: 12px;
}

.panel-photos-placeholder .emoji { font-size: 40px; opacity: 0.35; }

.panel-close {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: rgba(250,248,244,0.92);
  border: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--brown-deep);
  z-index: 10;
  font-family: 'Inter', sans-serif;
}

.panel-body { padding: 18px 20px 36px; flex: 1; }

.panel-category {
  font-size: 10.5px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  margin-bottom: 6px;
}

.panel-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--brown-deep);
  line-height: 1.2;
  margin-bottom: 3px;
}

.panel-title-jp {
  font-size: 14px;
  color: var(--brown-light);
  margin-bottom: 8px;
}

.panel-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}

.meta-chip {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--cream-dark);
  color: var(--brown-mid);
  border: 1px solid var(--border);
}

.panel-description {
  font-size: 13.5px;
  color: var(--brown-deep);
  line-height: 1.75;
  margin-bottom: 4px;
}

.panel-divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

.panel-section-label {
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.9px;
  color: var(--brown-light);
  margin-bottom: 6px;
}

.panel-section-text {
  font-size: 13px;
  color: var(--brown-mid);
  line-height: 1.65;
}

.panel-view-actions {
  display: flex;
  gap: 8px;
  margin-top: 20px;
}

.panel-view-actions .btn { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; }

/* Edit mode */
.panel-edit { display: none; flex-direction: column; flex: 1; }
.panel-edit.active { display: flex; }

.panel-edit-header {
  padding: 16px 18px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: var(--cream);
  position: sticky;
  top: 0;
  z-index: 5;
}

.panel-edit-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 600;
}

.panel-edit-body {
  padding: 18px 20px;
  flex: 1;
  overflow-y: auto;
}

.form-group {
  margin-bottom: 16px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 10.5px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--brown-light);
  margin-bottom: 5px;
}

.form-label span {
  font-size: 10px;
  text-transform: none;
  letter-spacing: 0;
  color: var(--brown-light);
  opacity: 0.7;
  font-weight: 400;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 8px 11px;
  border: 1px solid var(--border-mid);
  border-radius: 7px;
  background: white;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: var(--brown-deep);
  outline: none;
  transition: border-color 0.15s;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--terracotta);
}

.form-textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}

.form-textarea.short { min-height: 56px; }

.form-select { cursor: pointer; }

/* Photo upload */
.photo-upload-area {
  border: 1.5px dashed var(--border-mid);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
  cursor: pointer;
  background: var(--cream-dark);
  transition: border-color 0.15s;
}

.photo-upload-area:hover { border-color: var(--terracotta); }

.photo-upload-area input[type=file] { display: none; }

.photo-upload-label {
  font-size: 12px;
  color: var(--brown-mid);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.photo-upload-icon { font-size: 22px; opacity: 0.5; }

.photo-thumbs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.photo-thumb {
  position: relative;
  width: 72px;
  height: 72px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border-mid);
}

.photo-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.photo-thumb-remove {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(42,31,20,0.7);
  color: white;
  border: none;
  cursor: pointer;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

/* Edit footer */
.panel-edit-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  background: var(--cream);
  position: sticky;
  bottom: 0;
}

.panel-edit-footer .btn { flex: 1; padding: 10px 0; text-align: center; font-size: 13px; }

/* ── Confirm dialog ── */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(42,31,20,0.35);
  z-index: 3000;
  display: none;
  align-items: center;
  justify-content: center;
}

.confirm-overlay.visible { display: flex; }

.confirm-box {
  background: var(--cream);
  border-radius: 14px;
  padding: 24px;
  width: 300px;
  box-shadow: 0 12px 40px rgba(42,31,20,0.2);
  border: 1px solid var(--border-mid);
}

.confirm-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 8px;
}

.confirm-msg { font-size: 13px; color: var(--brown-mid); line-height: 1.6; margin-bottom: 18px; }

.confirm-actions { display: flex; gap: 8px; }
.confirm-actions .btn { flex: 1; padding: 9px 0; text-align: center; font-size: 13px; }

/* ── Pin count badge ── */
.pin-count {
  font-size: 11px;
  color: var(--brown-light);
  white-space: nowrap;
}

/* ── Hover tooltip ── */
.leaflet-tooltip.pin-tooltip {
  background: var(--cream) !important;
  border: 1px solid var(--border-mid) !important;
  border-radius: 12px !important;
  padding: 0 !important;
  overflow: hidden !important;
  box-shadow: 0 6px 24px rgba(42,31,20,0.16) !important;
  pointer-events: none !important;
  width: 210px !important;
}

.leaflet-tooltip.pin-tooltip::before { display: none !important; }

.tt-photo {
  width: 100%;
  height: 110px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tt-photo img { width: 100%; height: 100%; object-fit: cover; }

.tt-photo-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  opacity: 0.45;
}

.tt-body { padding: 9px 11px 11px; }

.tt-category {
  font-size: 9.5px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 3px;
}

.tt-name {
  font-family: 'Playfair Display', serif;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--brown-deep);
  line-height: 1.25;
  margin-bottom: 2px;
}

.tt-name-jp { font-size: 10.5px; color: var(--brown-light); margin-bottom: 5px; }

.tt-desc {
  font-size: 11.5px;
  color: var(--brown-mid);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.tt-season {
  font-size: 10px;
  color: var(--brown-light);
  margin-top: 5px;
}

/* ── Attribution ── */
.leaflet-control-attribution {
  font-size: 9px;
  background: rgba(250,248,244,0.8) !important;
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-mark">
      <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
        <circle cx="8.5" cy="7" r="3.5" fill="white"/>
        <path d="M8.5 1v2M8.5 12v2M2 7H4M13 7h2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M8.5 7L12 13.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="logo-name">JapanFocused</span>
  </div>
  <div class="header-right">
    <span class="pin-count" id="pinCount">0 pins</span>
    <button class="btn btn-add" id="btnAddPin" onclick="toggleAddMode()">＋ Add Pin</button>
    <button class="btn btn-ghost" onclick="exportPins()">Export JSON</button>
    <label class="btn btn-ghost" style="cursor:pointer">Import JSON
      <input type="file" accept=".json" style="display:none" onchange="importPins(this)">
    </label>
  </div>
</header>

<div class="layer-bar" id="layerBar">
  <span class="layer-bar-label">Layers</span>
</div>

<div class="add-banner" id="addBanner">Click anywhere on the map to place a pin — press Escape to cancel</div>

<div id="map"></div>

<!-- Side panel -->
<div class="side-panel" id="sidePanel">

  <!-- View mode -->
  <div class="panel-view" id="panelView">
    <div class="panel-photos" id="panelPhotos">
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-body" id="panelViewBody"></div>
  </div>

  <!-- Edit mode -->
  <div class="panel-edit" id="panelEdit">
    <div class="panel-edit-header">
      <span class="panel-edit-title" id="editTitle">Add pin</span>
      <button class="panel-close" style="position:static;width:28px;height:28px" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-edit-body">

      <div class="form-row">
        <div>
          <label class="form-label">Name <span>(English)</span></label>
          <input class="form-input" id="fNameEn" type="text" placeholder="e.g. Fushimi Inari">
        </div>
        <div>
          <label class="form-label">Name <span>(Japanese)</span></label>
          <input class="form-input" id="fNameJp" type="text" placeholder="e.g. 伏見稲荷大社">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="fCategory">
          <option value="">— select —</option>
          <option value="photography">📸 Photography Spot</option>
          <option value="temples">⛩️ Hidden Temple / Shrine</option>
          <option value="scenic">🚆 Scenic Train / Drive</option>
          <option value="cafes">☕ Unique Cafe / Stay</option>
          <option value="drone">🚁 Drone Spot</option>
          <option value="seasonal">🌸 Seasonal Location</option>
          <option value="walking">🥾 Walking Route</option>
          <option value="sunrise">🌅 Sunrise / Sunset</option>
        </select>
      </div>

      <div class="form-row">
        <div>
          <label class="form-label">Latitude</label>
          <input class="form-input" id="fLat" type="number" step="0.0001" placeholder="35.0000">
        </div>
        <div>
          <label class="form-label">Longitude</label>
          <input class="form-input" id="fLng" type="number" step="0.0001" placeholder="135.0000">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Prefecture / Region</label>
        <input class="form-input" id="fRegion" type="text" placeholder="e.g. Kyoto">
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="fDesc" placeholder="What makes this place special?"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Best Season / Time</label>
        <input class="form-input" id="fSeason" type="text" placeholder="e.g. Early April, dawn">
      </div>

      <div class="form-group">
        <label class="form-label">How to Get There</label>
        <textarea class="form-textarea short" id="fDirections" placeholder="Transport, stops, entrance fees..."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Photos</label>
        <div class="photo-upload-area" onclick="document.getElementById('fPhotos').click()">
          <label class="photo-upload-label">
            <span class="photo-upload-icon">🖼</span>
            <span>Click to add photos from your computer</span>
            <span style="font-size:11px;opacity:0.6">JPG, PNG — multiple allowed</span>
          </label>
          <input type="file" id="fPhotos" accept="image/*" multiple onchange="handlePhotoUpload(this)">
        </div>
        <div class="photo-thumbs" id="photoThumbs"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Notes / Tips</label>
        <textarea class="form-textarea short" id="fNotes" placeholder="Insider tips, warnings, nearby spots..."></textarea>
      </div>

    </div>
    <div class="panel-edit-footer">
      <button class="btn btn-ghost" onclick="closePanel()">Cancel</button>
      <button class="btn btn-danger" id="btnDelete" style="display:none" onclick="confirmDelete()">Delete pin</button>
      <button class="btn btn-primary" onclick="savePin()">Save pin</button>
    </div>
  </div>

</div>

<!-- Confirm dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">Remove this pin?</div>
    <div class="confirm-msg" id="confirmMsg">This pin and all its data will be permanently removed.</div>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" onclick="executeDelete()">Remove</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

/* ── Layer config ── */
const LAYERS = {
  photography: { label:'Photography',      emoji:'📸', color:'#d4683a', grad:['#f4a86a','#b84818'] },
  temples:     { label:'Hidden Temples',   emoji:'⛩️', color:'#7c5cbf', grad:['#b088e8','#5c3a9a'] },
  scenic:      { label:'Scenic Routes',    emoji:'🚆', color:'#3a8a6e', grad:['#78c4a4','#206050'] },
  cafes:       { label:'Unique Stays',     emoji:'☕', color:'#b8892a', grad:['#e8c870','#88620a'] },
  drone:       { label:'Drone Spots',      emoji:'🚁', color:'#3a70b5', grad:['#78a8e0','#1a4880'] },
  seasonal:    { label:'Seasonal',         emoji:'🌸', color:'#c0507a', grad:['#e890b8','#903060'] },
  walking:     { label:'Walking Routes',   emoji:'🥾', color:'#5a9032', grad:['#98ce60','#386810'] },
  sunrise:     { label:'Sunrise & Sunset', emoji:'🌅', color:'#c85030', grad:['#f09060','#983010'] },
};

/* ── IndexedDB storage ── */
const DB_NAME = 'japanfocused_v2';
const DB_VER  = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore('pins', { keyPath: 'id' });
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = () => reject(req.error);
  });
}

async function dbGetAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction('pins','readonly').objectStore('pins').getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

async function dbPutAll(allPins) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx    = db.transaction('pins','readwrite');
    const store = tx.objectStore('pins');
    store.clear();
    allPins.forEach(p => store.put(p));
    tx.oncomplete = resolve;
    tx.onerror    = () => reject(tx.error);
  });
}

function savePins() {
  dbPutAll(pins).catch(e => console.error('Save failed:', e));
  updatePinCount();
}

/* ── Export / Import ── */
function exportPins() {
  if (!pins.length) { alert('No pins to export yet.'); return; }
  const blob = new Blob([JSON.stringify(pins, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pins.json';
  a.click();
}

function importPins(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error();
      if (!confirm(`Import ${imported.length} pins? This will replace your current ${pins.length} pins.`)) return;
      pins = imported;
      savePins();
      renderAllPins();
    } catch { alert('Invalid file — please use a pins.json exported from JapanFocused.'); }
  };
  reader.readAsText(file);
  input.value = '';
}

/* ── State ── */
let pins = [];
let addMode = false;
let editingPinId = null;
let pendingDeleteId = null;
let photoData = [];   // base64 strings for current edit session
let currentPhotoIdx = 0;
const markerMap = {};
const layerGroups = {};
const activeLayers = new Set(Object.keys(LAYERS));

/* ── Map init ── */
const map = L.map('map', { center:[36.5,137.5], zoom:6, zoomControl:false });

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains:'abcd', maxZoom:19,
}).addTo(map);

L.control.zoom({ position:'bottomright' }).addTo(map);

Object.keys(LAYERS).forEach(key => {
  layerGroups[key] = L.layerGroup().addTo(map);
});

/* ── Layer bar ── */
const layerBar = document.getElementById('layerBar');
Object.entries(LAYERS).forEach(([key, lyr]) => {
  const pill = document.createElement('button');
  pill.className = 'layer-pill';
  pill.dataset.layer = key;
  pill.style.cssText = `background:${lyr.color};border-color:${lyr.color};color:white`;
  pill.innerHTML = `${lyr.emoji} ${lyr.label}`;
  pill.addEventListener('click', () => {
    if (activeLayers.has(key)) {
      activeLayers.delete(key);
      map.removeLayer(layerGroups[key]);
      pill.classList.add('inactive');
      pill.style.cssText = '';
    } else {
      activeLayers.add(key);
      map.addLayer(layerGroups[key]);
      pill.classList.remove('inactive');
      pill.style.cssText = `background:${lyr.color};border-color:${lyr.color};color:white`;
    }
  });
  layerBar.appendChild(pill);
});

/* ── Marker ── */
function makeIcon(layerKey) {
  const { color, emoji } = LAYERS[layerKey] || LAYERS.photography;
  return L.divIcon({
    className:'',
    html:`<svg width="30" height="36" viewBox="0 0 30 36" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 0C7 0 0 7 0 15c0 10.5 15 21 15 21s15-10.5 15-21C30 7 23 0 15 0z" fill="${color}" opacity="0.92"/>
      <circle cx="15" cy="14" r="7.5" fill="white" opacity="0.95"/>
      <text x="15" y="18.5" text-anchor="middle" font-size="9" font-family="sans-serif">${emoji}</text>
    </svg>`,
    iconSize:[30,36], iconAnchor:[15,36], popupAnchor:[0,-38],
  });
}

/* ── Render all pins ── */
function renderAllPins() {
  Object.values(layerGroups).forEach(g => g.clearLayers());
  Object.keys(markerMap).forEach(k => delete markerMap[k]);
  pins.forEach(renderPin);
  updatePinCount();
}

function renderPin(pin) {
  const lyr = LAYERS[pin.layer] || LAYERS.photography;
  const photoSrc = pin.photos && pin.photos.length ? pin.photos[0] : null;

  const popupHtml = `
    <div class="popup-photo">
      ${photoSrc
        ? `<img src="${photoSrc}" alt="${pin.nameEn}">`
        : `<div class="popup-photo-placeholder"><div class="emoji">${lyr.emoji}</div><span>No photo yet</span></div>`}
    </div>
    <div class="popup-body">
      <div class="popup-category" style="color:${lyr.color}">${lyr.emoji} ${lyr.label}</div>
      <div class="popup-title">${pin.nameEn || 'Unnamed pin'}</div>
      ${pin.nameJp ? `<div class="popup-title-jp">${pin.nameJp}</div>` : ''}
      <div class="popup-summary">${pin.desc || 'No description yet.'}</div>
      <div class="popup-actions">
        <button class="popup-btn" onclick="openEditPanel('${pin.id}')">Edit</button>
        <button class="popup-btn primary" onclick="openViewPanel('${pin.id}')">View details</button>
      </div>
    </div>`;

  const tooltipHtml = `
    <div class="tt-photo">
      ${photoSrc
        ? `<img src="${photoSrc}" alt="${pin.nameEn}">`
        : `<div class="tt-photo-placeholder" style="background:linear-gradient(135deg,${lyr.grad[0]},${lyr.grad[1]})">${lyr.emoji}</div>`}
    </div>
    <div class="tt-body">
      <div class="tt-category" style="color:${lyr.color}">${lyr.emoji} ${lyr.label}</div>
      <div class="tt-name">${pin.nameEn || 'Unnamed pin'}</div>
      ${pin.nameJp ? `<div class="tt-name-jp">${pin.nameJp}</div>` : ''}
      ${pin.desc ? `<div class="tt-desc">${pin.desc}</div>` : ''}
      ${pin.season ? `<div class="tt-season">🗓 ${pin.season}</div>` : ''}
    </div>`;

  const marker = L.marker([pin.lat, pin.lng], { icon: makeIcon(pin.layer) })
    .bindPopup(popupHtml, { maxWidth:240, minWidth:240 })
    .bindTooltip(tooltipHtml, {
      direction: 'right',
      offset: [10, -18],
      className: 'pin-tooltip',
      sticky: false,
    });

  layerGroups[pin.layer].addLayer(marker);
  markerMap[pin.id] = marker;
}

function updatePinCount() {
  const el = document.getElementById('pinCount');
  el.textContent = pins.length === 1 ? '1 pin' : `${pins.length} pins`;
}

/* ── Add mode ── */
function toggleAddMode() {
  addMode = !addMode;
  const btn = document.getElementById('btnAddPin');
  const banner = document.getElementById('addBanner');
  const mapEl = document.getElementById('map');
  if (addMode) {
    btn.classList.add('active');
    btn.textContent = '✕ Cancel';
    banner.classList.add('visible');
    mapEl.classList.add('add-mode');
  } else {
    btn.classList.remove('active');
    btn.textContent = '＋ Add Pin';
    banner.classList.remove('visible');
    mapEl.classList.remove('add-mode');
  }
}

map.on('click', e => {
  if (!addMode) return;
  toggleAddMode();
  map.closePopup();
  openEditPanel(null, e.latlng.lat, e.latlng.lng);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && addMode) toggleAddMode();
});

/* ── Open view panel ── */
function openViewPanel(id) {
  const pin = pins.find(p => p.id === id);
  if (!pin) return;
  const lyr = LAYERS[pin.layer] || LAYERS.photography;

  /* Photos */
  const photosEl = document.getElementById('panelPhotos');
  currentPhotoIdx = 0;
  if (pin.photos && pin.photos.length) {
    let dotsHtml = pin.photos.length > 1
      ? `<div class="panel-photo-nav">${pin.photos.map((_, i) =>
          `<div class="panel-photo-dot${i===0?' active':''}" onclick="showPhoto('${id}',${i})"></div>`
        ).join('')}</div>`
      : '';
    photosEl.innerHTML = `<img id="panelPhotoImg" src="${pin.photos[0]}" alt="${pin.nameEn}">
      <button class="panel-close" onclick="closePanel()">✕</button>${dotsHtml}`;
  } else {
    const grad = `linear-gradient(135deg,${lyr.grad[0]},${lyr.grad[1]})`;
    photosEl.innerHTML = `<div class="panel-photos-placeholder" style="background:${grad};width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px">
      <div class="emoji" style="font-size:40px;opacity:0.45">${lyr.emoji}</div>
      <span style="font-size:11px;color:rgba(255,255,255,0.7)">No photos added yet</span>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>`;
  }

  /* Body */
  const body = document.getElementById('panelViewBody');
  const metaChips = [
    pin.region ? `📍 ${pin.region}` : null,
    pin.season ? `🗓 ${pin.season}` : null,
  ].filter(Boolean).map(c => `<span class="meta-chip">${c}</span>`).join('');

  body.innerHTML = `
    <div class="panel-category" style="color:${lyr.color}">${lyr.emoji} ${lyr.label}</div>
    <div class="panel-title">${pin.nameEn || 'Unnamed pin'}</div>
    ${pin.nameJp ? `<div class="panel-title-jp">${pin.nameJp}</div>` : ''}
    ${metaChips ? `<div class="panel-meta">${metaChips}</div>` : ''}
    ${pin.desc ? `<div class="panel-description">${pin.desc}</div>` : ''}
    ${pin.directions ? `<div class="panel-divider"></div>
      <div class="panel-section-label">How to get there</div>
      <div class="panel-section-text">${pin.directions}</div>` : ''}
    ${pin.notes ? `<div class="panel-divider"></div>
      <div class="panel-section-label">Notes & tips</div>
      <div class="panel-section-text">${pin.notes}</div>` : ''}
    <div class="panel-view-actions">
      <button class="btn btn-ghost" onclick="openEditPanel('${id}')">Edit</button>
      <button class="btn btn-danger" onclick="pendingDeleteId='${id}';confirmDelete()">Remove</button>
    </div>`;

  showPanel('view');
}

function showPhoto(pinId, idx) {
  const pin = pins.find(p => p.id === pinId);
  if (!pin || !pin.photos) return;
  currentPhotoIdx = idx;
  document.getElementById('panelPhotoImg').src = pin.photos[idx];
  document.querySelectorAll('.panel-photo-dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
}

/* ── Open edit panel ── */
function openEditPanel(id, lat, lng) {
  editingPinId = id;
  photoData = [];

  const pin = id ? pins.find(p => p.id === id) : null;

  document.getElementById('editTitle').textContent = id ? 'Edit pin' : 'Add pin';
  document.getElementById('btnDelete').style.display = id ? '' : 'none';

  document.getElementById('fNameEn').value    = pin?.nameEn    || '';
  document.getElementById('fNameJp').value    = pin?.nameJp    || '';
  document.getElementById('fCategory').value  = pin?.layer     || '';
  document.getElementById('fLat').value       = pin ? pin.lat  : (lat ? lat.toFixed(6) : '');
  document.getElementById('fLng').value       = pin ? pin.lng  : (lng ? lng.toFixed(6) : '');
  document.getElementById('fRegion').value    = pin?.region    || '';
  document.getElementById('fDesc').value      = pin?.desc      || '';
  document.getElementById('fSeason').value    = pin?.season    || '';
  document.getElementById('fDirections').value= pin?.directions|| '';
  document.getElementById('fNotes').value     = pin?.notes     || '';

  photoData = pin?.photos ? [...pin.photos] : [];
  renderPhotoThumbs();

  showPanel('edit');
}

/* ── Photo upload ── */
function handlePhotoUpload(input) {
  const files = Array.from(input.files);
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      photoData.push(e.target.result);
      loaded++;
      if (loaded === files.length) renderPhotoThumbs();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderPhotoThumbs() {
  const container = document.getElementById('photoThumbs');
  container.innerHTML = photoData.map((src, i) => `
    <div class="photo-thumb">
      <img src="${src}" alt="photo ${i+1}">
      <button class="photo-thumb-remove" onclick="removePhoto(${i})">✕</button>
    </div>`).join('');
}

function removePhoto(idx) {
  photoData.splice(idx, 1);
  renderPhotoThumbs();
}

/* ── Save pin ── */
function savePin() {
  const nameEn = document.getElementById('fNameEn').value.trim();
  const layer  = document.getElementById('fCategory').value;
  const lat    = parseFloat(document.getElementById('fLat').value);
  const lng    = parseFloat(document.getElementById('fLng').value);

  if (!nameEn)  { alert('Please enter a name (English).'); return; }
  if (!layer)   { alert('Please select a category.'); return; }
  if (isNaN(lat) || isNaN(lng)) { alert('Please enter valid coordinates.'); return; }

  const pinData = {
    nameEn,
    nameJp:      document.getElementById('fNameJp').value.trim(),
    layer,
    lat,
    lng,
    region:      document.getElementById('fRegion').value.trim(),
    desc:        document.getElementById('fDesc').value.trim(),
    season:      document.getElementById('fSeason').value.trim(),
    directions:  document.getElementById('fDirections').value.trim(),
    notes:       document.getElementById('fNotes').value.trim(),
    photos:      [...photoData],
    updatedAt:   Date.now(),
  };

  if (editingPinId) {
    const idx = pins.findIndex(p => p.id === editingPinId);
    pins[idx] = { ...pins[idx], ...pinData };
  } else {
    pins.push({ id: Date.now().toString(), createdAt: Date.now(), ...pinData });
  }

  savePins();
  renderAllPins();
  closePanel();
}

/* ── Delete pin ── */
function confirmDelete() {
  if (!pendingDeleteId && editingPinId) pendingDeleteId = editingPinId;
  const pin = pins.find(p => p.id === pendingDeleteId);
  document.getElementById('confirmMsg').textContent =
    pin ? `"${pin.nameEn || 'This pin'}" will be permanently removed.` : 'This pin will be permanently removed.';
  document.getElementById('confirmOverlay').classList.add('visible');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('visible');
  pendingDeleteId = null;
}

function executeDelete() {
  pins = pins.filter(p => p.id !== pendingDeleteId);
  savePins();
  renderAllPins();
  closeConfirm();
  closePanel();
}

/* ── Panel helpers ── */
function showPanel(mode) {
  document.getElementById('panelView').className = 'panel-view' + (mode==='view' ? ' active' : '');
  document.getElementById('panelEdit').className = 'panel-edit' + (mode==='edit' ? ' active' : '');
  document.getElementById('sidePanel').classList.add('open');
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  editingPinId = null;
  pendingDeleteId = null;
  map.closePopup();
}

map.on('popupclose', () => {
  /* don't auto-close panel on popup close */
});

/* ── Init ── */
async function init() {
  pins = await dbGetAll();
  renderAllPins();
}

init();

</script>
</body>
</html>
